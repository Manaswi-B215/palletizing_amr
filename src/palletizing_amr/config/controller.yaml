controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_base:
      type: diff_drive_controller/DiffDriveController

    forklift_controller:
      type: position_controllers/JointGroupPositionController

diff_drive_base:
  ros__parameters:
    left_wheel_names: ["revolute_wheel_MR1", "revolute_wheel_MR2"]
    right_wheel_names: ["revolute_wheel_ML1", "revolute_wheel_ML2"]

    wheel_separation: 0.3526
    wheel_radius: 0.028
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    base_frame_id: base_link
    odom_frame_id: odom

    cmd_vel_timeout: 0.5
    publish_rate: 50.0

    use_stamped_vel: true

forklift_controller:
  ros__parameters:
    joints:
      - prismatic_forklift

